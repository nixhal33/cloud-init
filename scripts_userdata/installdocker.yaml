#cloud-config
package_update: true
package_upgrade: true
packages:
  - git
  - htop
  - curl
  - wget

users:
  - name: nix
    groups: sudo 
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    shell: /bin/bash
    ssh-authorized: 
      - ssh-ed25519.pub---->add your own ssh key bihhh!!


write_files:
  - path: /root/install-devops-stack.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e
      echo "=================================================="
      echo "   Full DevOps Stack Installation Script"
      echo "=================================================="
      echo "[1/4] Removing old Docker versions..."
      sudo apt remove -y $(dpkg --get-selections docker.io docker-compose docker-compose-v2 docker-doc podman-docker containerd runc 2>/dev/null | cut -f1) 2>/dev/null || true
      echo "[2/4] Installing Docker..."
      sudo apt update -y
      sudo apt install -y ca-certificates curl
      sudo install -m 0755 -d /etc/apt/keyrings
      sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
      sudo chmod a+r /etc/apt/keyrings/docker.asc
      sudo tee /etc/apt/sources.list.d/docker.sources <<EOF
      Types: deb
      URIs: https://download.docker.com/linux/ubuntu
      Suites: $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}")
      Components: stable
      Architectures: $(dpkg --print-architecture)
      Signed-By: /etc/apt/keyrings/docker.asc
      EOF
      sudo apt update -y
      sudo apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
      sudo systemctl enable docker
      sudo systemctl start docker
      sudo apt install -y tree
      sudo usermod -aG docker ubuntu

runcmd:
  - /root/install-devops-stack.sh
  - echo "cloud-init finished at $(date)" >> /var/log/my-cloudinit-test.log
  - ls -ltr >>/home/nix/directory.txt
